name: Build TFLite Flex Delegate for Android

on:
  workflow_dispatch:
    inputs:
      tf_ref:
        description: 'TensorFlow git ref (branch, tag, or SHA)'
        required: false
        default: 'master'
  push:
    paths:
      - 'patches/**'
      - '.github/workflows/build-flex-delegate-android.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  ANDROID_NDK_API_LEVEL: '21'
  ANDROID_NDK_VERSION: '28'
  HERMETIC_PYTHON_VERSION: '3.12'

jobs:
  resolve-ref:
    name: Resolve TF commit
    runs-on: ubuntu-22.04
    outputs:
      tf_sha: ${{ steps.sha.outputs.tf_sha }}
      tf_short: ${{ steps.sha.outputs.tf_short }}
    steps:
      - name: Get TensorFlow HEAD SHA
        id: sha
        run: |
          TF_SHA=$(git ls-remote https://github.com/tensorflow/tensorflow.git \
            "${{ inputs.tf_ref || 'master' }}" | awk '{print $1}')

          # If tf_ref is already a full SHA (not a branch/tag), ls-remote returns empty
          if [ -z "$TF_SHA" ]; then
            TF_SHA="${{ inputs.tf_ref }}"
          fi

          echo "tf_sha=$TF_SHA" >> "$GITHUB_OUTPUT"
          echo "tf_short=${TF_SHA:0:12}" >> "$GITHUB_OUTPUT"
          echo "Resolved TF ref: $TF_SHA"

  build:
    name: Flex Delegate (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    needs: resolve-ref
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            bazel_config: android_arm64
          - arch: armeabi-v7a
            bazel_config: android_arm

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android/sdk/ndk \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/share/swift \
            /usr/local/graalvm
          sudo apt-get clean
          df -h /

      - name: Checkout this repo (patches + workflow)
        uses: actions/checkout@v4

      - name: Checkout TensorFlow
        uses: actions/checkout@v4
        with:
          repository: tensorflow/tensorflow
          ref: ${{ needs.resolve-ref.outputs.tf_sha }}
          path: tensorflow

      - name: Set up Android NDK r28
        run: |
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;28.2.13676358" "platforms;android-36" "build-tools;36.1.0" \
            --sdk_root="$ANDROID_SDK_ROOT" 2>&1 | tail -5

          NDK_HOME="$ANDROID_SDK_ROOT/ndk/28.2.13676358"
          echo "ANDROID_NDK_HOME=$NDK_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_API_LEVEL=36" >> "$GITHUB_ENV"
          echo "ANDROID_BUILD_TOOLS_VERSION=36.1.0" >> "$GITHUB_ENV"
          test -d "$NDK_HOME/toolchains" && echo "✅ NDK r28c installed"

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.arch }}
          repository-cache: true

      - name: Apply build patches
        working-directory: tensorflow
        run: |
          for patch in "$GITHUB_WORKSPACE"/patches/*.patch; do
            echo "Applying $(basename "$patch")..."
            git apply "$patch"
          done
          echo "✅ All patches applied"

      - name: Verify patches
        working-directory: tensorflow
        run: |
          grep -A2 'if_not_mobile' tensorflow/core/BUILD | grep onednn_env_vars
          grep 'tsl/concurrency:executor' tensorflow/core/kernels/BUILD
          echo "✅ Verified"

      - name: Build Flex Delegate
        working-directory: tensorflow
        run: |
          bazel build \
            --config=${{ matrix.bazel_config }} \
            --repo_env=HERMETIC_PYTHON_VERSION=${{ env.HERMETIC_PYTHON_VERSION }} \
            //tensorflow/lite/delegates/flex:tensorflowlite_flex

      - name: Rename artifact
        run: |
          mkdir -p output
          cp tensorflow/bazel-out/${{ matrix.arch }}-opt/bin/tensorflow/lite/delegates/flex/libtensorflowlite_flex.so \
             output/libtensorflowlite_flex-${{ matrix.arch }}.so
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libtensorflowlite_flex-${{ matrix.arch }}
          path: output/libtensorflowlite_flex-${{ matrix.arch }}.so
          retention-days: 30

  release:
    name: Create release
    runs-on: ubuntu-22.04
    needs: [resolve-ref, build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tf-${{ needs.resolve-ref.outputs.tf_short }}
          name: "TF Flex Delegate — tf@${{ needs.resolve-ref.outputs.tf_short }}"
          body: |
            TensorFlow Lite Flex Delegate for Android with 16KB page size support.

            **TensorFlow commit:** [`${{ needs.resolve-ref.outputs.tf_short }}`](https://github.com/tensorflow/tensorflow/commit/${{ needs.resolve-ref.outputs.tf_sha }})

            ## Files

            | File | ABI |
            |------|-----|
            | `libtensorflowlite_flex-arm64-v8a.so` | 64-bit ARM |
            | `libtensorflowlite_flex-armeabi-v7a.so` | 32-bit ARM |

            ## Usage

            Download both `.so` files and place them in your Android project:

            ```
            android/app/src/main/jniLibs/
            ├── arm64-v8a/libtensorflowlite_flex.so      ← rename, drop the ABI suffix
            └── armeabi-v7a/libtensorflowlite_flex.so
            ```

            See [README](https://github.com/${{ github.repository }}#replacing-so-in-a-project-using-flutter_litert_flex) for full integration instructions.
          files: |
            artifacts/libtensorflowlite_flex-arm64-v8a/libtensorflowlite_flex-arm64-v8a.so
            artifacts/libtensorflowlite_flex-armeabi-v7a/libtensorflowlite_flex-armeabi-v7a.so
          fail_on_unmatched_files: true
          make_latest: true
